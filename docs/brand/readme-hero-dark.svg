<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" role="img" aria-label="deblob — Give every blob a permanent shape.">
  <!-- README hero (dark). Geometric Imprintling STAND-IN per docs/brand/design-book.md;
       replace with canonical mascot art once the model sheet exists. -->
  <rect width="1200" height="360" fill="#0B1118"/>

  <!-- Imprintling, left, facing the wordmark -->
  <g transform="translate(70 96) scale(1.9)">
    <!-- one shadow shape -->
    <ellipse cx="46" cy="86" rx="40" ry="7" fill="#148F7A" opacity="0.55"/>
    <!-- body: wide, asymmetric, flat base, two-lobe top -->
    <path fill="#35D0B2" stroke="#0B1118" stroke-width="2.2" stroke-linejoin="round" d="
      M 14 90 C 5 90 3 66 7 55 C 9 36 19 18 38 18
      C 48 18 50 27 59 27 C 68 27 74 12 90 17
      C 106 22 106 50 104 62 C 103 78 95 90 80 90 Z"/>
    <!-- one highlight shape -->
    <ellipse cx="30" cy="40" rx="8" ry="5" fill="#A6F3E2" opacity="0.85"/>
    <!-- schema core: rigid axis-aligned rounded square, matched (teal grid) -->
    <rect x="44" y="56" width="30" height="26" rx="3.5" fill="#F7F9FB" stroke="#0B1118" stroke-width="2.2"/>
    <path d="M45 65 h28 M45 73 h28 M59 56 v13" stroke="#35D0B2" stroke-width="1.8" fill="none"/>
    <!-- asymmetric face -->
    <rect x="40" y="38" width="6" height="14" rx="3" fill="#0B1118"/>
    <rect x="60" y="41" width="9" height="9" rx="2" fill="#0B1118"/>
    <path d="M50 49 l5 4 -5 4 -5 -4 Z" fill="#0B1118"/>
  </g>

  <!-- wordmark + tagline -->
  <text x="330" y="150" font-family="'Trebuchet MS', Verdana, sans-serif" font-size="72" font-weight="600" fill="#E7EDF3">deblob</text>
  <text x="333" y="192" font-family="'Segoe UI', Verdana, sans-serif" font-size="23" fill="#9AA8B6">Give every blob a permanent shape.</text>

  <!-- flow: irregular amber records → teal schema identity, dashed blue discovery branch -->
  <g font-family="'Consolas', 'Courier New', monospace" font-size="15">
    <!-- irregular records -->
    <g fill="#F5A524">
      <path d="M690 236 l20 -3 4 16 -19 4 Z"/>
      <path d="M718 232 l19 2 -2 17 -20 -2 Z" opacity="0.8"/>
      <path d="M745 238 l18 -2 3 15 -18 3 Z" opacity="0.6"/>
    </g>
    <text x="690" y="220" fill="#9AA8B6">irregular records</text>
    <!-- solid amber arrow (hot path) -->
    <path d="M792 242 H 902" stroke="#F5A524" stroke-width="2.4" fill="none" marker-end="url(#ah)"/>
    <!-- teal identity tile -->
    <rect x="912" y="224" width="34" height="34" rx="4" fill="#0B1118" stroke="#35D0B2" stroke-width="2.4"/>
    <path d="M918 236 h22 M918 246 h22 M929 224 v34" stroke="#35D0B2" stroke-width="1.6" fill="none"/>
    <text x="958" y="238" fill="#35D0B2">sch_7M4K2W…F9Q</text>
    <text x="958" y="256" fill="#9AA8B6">schema identity</text>
    <!-- dashed blue discovery branch -->
    <path d="M840 250 C 850 300, 890 300, 900 312" stroke="#5AA7FF" stroke-width="2" stroke-dasharray="5 5" fill="none"/>
    <text x="908" y="318" fill="#5AA7FF">asynchronous discovery</text>
  </g>

  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0 0 L9 4.5 L0 9 Z" fill="#F5A524"/>
    </marker>
  </defs>
</svg>
