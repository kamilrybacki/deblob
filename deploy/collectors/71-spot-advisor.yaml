# greenwindow collector — spot-advisor (compute-optimization signal; joint-research). No auth.
apiVersion: v1
kind: ConfigMap
metadata: {name: collector-spot-advisor-sh, namespace: deblob}
data:
  collect.sh: |
    #!/bin/sh
    set -u
    P="http://redpanda.deblob.svc.cluster.local:8082/topics/events.compute.spot-advisor"
    UA="greenwindow-collector (kamilandrzejrybacki@gmail.com)"
    CT="Content-Type: application/vnd.kafka.json.v2+json"
    body=$(curl -sf -A "$UA" --max-time 25 "https://spot-bid-advisor.s3.amazonaws.com/spot-advisor-data.json") || { echo FETCH-FAIL; exit 0; }
    for R in eu-central-1 eu-west-1 us-east-1; do
      echo "$body" | jq -c --arg r "$R" '{records:[(.spot_advisor[$r]//{}|to_entries[])|.key as $os|(.value|to_entries[])|{value:{region:$r,os:$os,instance:.key,interrupt_rate:.value.r,savings:.value.s}}]}' | curl -sf -X POST "$P" -H "$CT" --data-binary @- -o /dev/null -w "PRODUCED spot-advisor[$R] -> %{http_code}\n" || echo "PRODUCE-FAIL spot-advisor[$R]"
      sleep 1
    done
    echo done

---
apiVersion: batch/v1
kind: CronJob
metadata: {name: collector-spot-advisor, namespace: deblob, labels: {app: greenwindow-collector, source: spot-advisor}}
spec:
  schedule: "17 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 180
      template:
        metadata: {labels: {app: greenwindow-collector, source: spot-advisor}}
        spec:
          restartPolicy: Never
          imagePullSecrets: [{name: ghcr-pull}]
          affinity: {nodeAffinity: {requiredDuringSchedulingIgnoredDuringExecution: {nodeSelectorTerms: [{matchExpressions: [{key: node-role.kubernetes.io/control-plane, operator: DoesNotExist}]}]}}}
          securityContext: {runAsNonRoot: true, runAsUser: 65532, seccompProfile: {type: RuntimeDefault}}
          containers:
          - name: collect
            image: ghcr.io/kamilandrzejrybacki-inc/greenwindow-collector:1
            command: ["/bin/sh", "/scripts/collect.sh"]
            securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
            resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 200m, memory: 128Mi}}
            volumeMounts: [{name: script, mountPath: /scripts, readOnly: true}]
          volumes:
          - {name: script, configMap: {name: collector-spot-advisor-sh}}
