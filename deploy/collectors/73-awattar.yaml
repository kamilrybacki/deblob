# greenwindow collector — awattar (compute-optimization signal; joint-research). No auth.
apiVersion: v1
kind: ConfigMap
metadata: {name: collector-awattar-sh, namespace: deblob}
data:
  collect.sh: |
    #!/bin/sh
    set -u
    P="http://redpanda.deblob.svc.cluster.local:8082/topics/events.energy.awattar"
    UA="greenwindow-collector (kamilandrzejrybacki@gmail.com)"
    CT="Content-Type: application/vnd.kafka.json.v2+json"
    for C in at de; do
      body=$(curl -sf -A "$UA" --max-time 20 "https://api.awattar.$C/v1/marketdata") || { echo "FETCH-FAIL [$C]"; continue; }
      echo "$body" | jq -c --arg c "$C" '{records:[(.data[]?)|{value:(.+{country:$c})}]}' | curl -sf -X POST "$P" -H "$CT" --data-binary @- -o /dev/null -w "PRODUCED awattar[$C] -> %{http_code}\n" || echo "PRODUCE-FAIL awattar[$C]"
      sleep 1
    done
    echo done

---
apiVersion: batch/v1
kind: CronJob
metadata: {name: collector-awattar, namespace: deblob, labels: {app: greenwindow-collector, source: awattar}}
spec:
  schedule: "33 14 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 180
      template:
        metadata: {labels: {app: greenwindow-collector, source: awattar}}
        spec:
          restartPolicy: Never
          imagePullSecrets: [{name: ghcr-pull}]
          affinity: {nodeAffinity: {requiredDuringSchedulingIgnoredDuringExecution: {nodeSelectorTerms: [{matchExpressions: [{key: node-role.kubernetes.io/control-plane, operator: DoesNotExist}]}]}}}
          securityContext: {runAsNonRoot: true, runAsUser: 65532, seccompProfile: {type: RuntimeDefault}}
          containers:
          - name: collect
            image: ghcr.io/kamilandrzejrybacki-inc/greenwindow-collector:1
            command: ["/bin/sh", "/scripts/collect.sh"]
            securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
            resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 200m, memory: 128Mi}}
            volumeMounts: [{name: script, mountPath: /scripts, readOnly: true}]
          volumes:
          - {name: script, configMap: {name: collector-awattar-sh}}
