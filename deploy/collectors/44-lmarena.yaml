# greenwindow collector — LMArena leaderboard (authoritative LLM rankings).
# No auth via the HF datasets-server first-rows endpoint. One record per model
# row (rating bounds, variance, votes, rank, category). No PII (org = company).
apiVersion: v1
kind: ConfigMap
metadata: {name: collector-lmarena-sh, namespace: deblob}
data:
  collect.sh: |
    #!/bin/sh
    set -u
    PROXY="http://redpanda.deblob.svc.cluster.local:8082/topics/events.ai.arena"
    UA="greenwindow-collector (kamilandrzejrybacki@gmail.com)"
    CT="Content-Type: application/vnd.kafka.json.v2+json"
    URL="https://datasets-server.huggingface.co/first-rows?dataset=lmarena-ai%2Fleaderboard-dataset&config=text_style_control&split=latest"
    UNWRAP='{records: [ (.rows[]?.row) | {value: .} ]}'
    body=$(curl -sf -A "$UA" --max-time 25 "$URL") || { echo "FETCH-FAIL"; exit 0; }
    echo "$body" | jq -c "$UNWRAP" | \
      curl -sf -X POST "$PROXY" -H "$CT" --data-binary @- \
           -o /dev/null -w "PRODUCED arena -> %{http_code}\n" || echo "PRODUCE-FAIL"
    echo "collector done"
---
apiVersion: batch/v1
kind: CronJob
metadata: {name: collector-lmarena, namespace: deblob, labels: {app: greenwindow-collector, source: lmarena}}
spec:
  schedule: "27 7 * * *"            # daily
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 120
      template:
        metadata: {labels: {app: greenwindow-collector, source: lmarena}}
        spec:
          restartPolicy: Never
          imagePullSecrets: [{name: ghcr-pull}]
          affinity:
            nodeAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                nodeSelectorTerms:
                - matchExpressions:
                  - {key: node-role.kubernetes.io/control-plane, operator: DoesNotExist}
          securityContext: {runAsNonRoot: true, runAsUser: 65532, seccompProfile: {type: RuntimeDefault}}
          containers:
          - name: collect
            image: ghcr.io/kamilandrzejrybacki-inc/greenwindow-collector:1
            command: ["/bin/sh", "/scripts/collect.sh"]
            securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
            resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 200m, memory: 96Mi}}
            volumeMounts: [{name: script, mountPath: /scripts, readOnly: true}]
          volumes:
          - {name: script, configMap: {name: collector-lmarena-sh}}
