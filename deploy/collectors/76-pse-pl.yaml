# greenwindow collector — pse-pl (compute-optimization signal; joint-research). No auth.
apiVersion: v1
kind: ConfigMap
metadata: {name: collector-pse-pl-sh, namespace: deblob}
data:
  collect.sh: |
    #!/bin/sh
    set -u
    P="http://redpanda.deblob.svc.cluster.local:8082/topics/events.energy.pse-pl"
    UA="greenwindow-collector (kamilandrzejrybacki@gmail.com)"
    CT="Content-Type: application/vnd.kafka.json.v2+json"
    for E in pk5l-wp rce-pln poze-redoze his-wlk-cal; do
      body=$(curl -sf -A "$UA" --max-time 25 "https://api.raporty.pse.pl/api/$E?\$first=200") || { echo "FETCH-FAIL [$E]"; continue; }
      echo "$body" | jq -c --arg e "$E" '{records:[(.value[]?)|{value:(.+{pse_endpoint:$e})}]}' | curl -sf -X POST "$P" -H "$CT" --data-binary @- -o /dev/null -w "PRODUCED pse[$E] -> %{http_code}\n" || echo "PRODUCE-FAIL pse[$E]"
      sleep 1
    done
    echo done

---
apiVersion: batch/v1
kind: CronJob
metadata: {name: collector-pse-pl, namespace: deblob, labels: {app: greenwindow-collector, source: pse-pl}}
spec:
  schedule: "8,23,38,53 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 180
      template:
        metadata: {labels: {app: greenwindow-collector, source: pse-pl}}
        spec:
          restartPolicy: Never
          imagePullSecrets: [{name: ghcr-pull}]
          affinity: {nodeAffinity: {requiredDuringSchedulingIgnoredDuringExecution: {nodeSelectorTerms: [{matchExpressions: [{key: node-role.kubernetes.io/control-plane, operator: DoesNotExist}]}]}}}
          securityContext: {runAsNonRoot: true, runAsUser: 65532, seccompProfile: {type: RuntimeDefault}}
          containers:
          - name: collect
            image: ghcr.io/kamilandrzejrybacki-inc/greenwindow-collector:1
            command: ["/bin/sh", "/scripts/collect.sh"]
            securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
            resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 200m, memory: 128Mi}}
            volumeMounts: [{name: script, mountPath: /scripts, readOnly: true}]
          volumes:
          - {name: script, configMap: {name: collector-pse-pl-sh}}
