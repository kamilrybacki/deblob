# greenwindow collector — opensky (joint-research reports). No auth.
apiVersion: v1
kind: ConfigMap
metadata: {name: collector-opensky-sh, namespace: deblob}
data:
  collect.sh: |
    #!/bin/sh
    set -u
    P="http://redpanda.deblob.svc.cluster.local:8082/topics/events.geo.flights"
    UA="greenwindow-collector (kamilandrzejrybacki@gmail.com)"
    CT="Content-Type: application/vnd.kafka.json.v2+json"
    body=$(curl -sf -A "$UA" --max-time 25 "https://opensky-network.org/api/states/all?lamin=48&lomin=12&lamax=56&lomax=26") || { echo FETCH-FAIL; exit 0; }
    # OpenSky state vectors are POSITIONAL arrays (no field names) — Deblob can't
    # infer a schema from a bare array-of-scalars. Zip the documented 17-field
    # order into a keyed object so a real named shape is discovered (index 12
    # "sensors" is usually null/array — dropped).
    echo "$body" | jq -c '{records:[(.states[]?)|{value:{icao24:.[0],callsign:.[1],origin_country:.[2],time_position:.[3],last_contact:.[4],longitude:.[5],latitude:.[6],baro_altitude:.[7],on_ground:.[8],velocity:.[9],true_track:.[10],vertical_rate:.[11],geo_altitude:.[13],squawk:.[14],spi:.[15],position_source:.[16]}}]}' | curl -sf -X POST "$P" -H "$CT" --data-binary @- -o /dev/null -w "PRODUCED opensky -> %{http_code}\n" || echo PRODUCE-FAIL
    echo done

---
apiVersion: batch/v1
kind: CronJob
metadata: {name: collector-opensky, namespace: deblob, labels: {app: greenwindow-collector, source: opensky}}
spec:
  schedule: "*/25 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 2
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 180
      template:
        metadata: {labels: {app: greenwindow-collector, source: opensky}}
        spec:
          restartPolicy: Never
          imagePullSecrets: [{name: ghcr-pull}]
          affinity: {nodeAffinity: {requiredDuringSchedulingIgnoredDuringExecution: {nodeSelectorTerms: [{matchExpressions: [{key: node-role.kubernetes.io/control-plane, operator: DoesNotExist}]}]}}}
          securityContext: {runAsNonRoot: true, runAsUser: 65532, seccompProfile: {type: RuntimeDefault}}
          containers:
          - name: collect
            image: ghcr.io/kamilandrzejrybacki-inc/greenwindow-collector:1
            command: ["/bin/sh", "/scripts/collect.sh"]
            securityContext: {allowPrivilegeEscalation: false, readOnlyRootFilesystem: true, capabilities: {drop: [ALL]}}
            resources: {requests: {cpu: 10m, memory: 16Mi}, limits: {cpu: 200m, memory: 128Mi}}
            volumeMounts: [{name: script, mountPath: /scripts, readOnly: true}]
          volumes:
          - {name: script, configMap: {name: collector-opensky-sh}}
