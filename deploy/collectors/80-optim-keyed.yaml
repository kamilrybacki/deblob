# ── Fingrid — Nordic grid frequency (system-stress veto). x-api-key.
apiVersion: v1
kind: ConfigMap
metadata: {name: collector-fingrid-sh, namespace: deblob}
data:
  collect.sh: |
    #!/bin/sh
    set -u
    P="http://redpanda.deblob.svc.cluster.local:8082/topics/events.grid.fingrid"
    UA="greenwindow-collector (kamilandrzejrybacki@gmail.com)"
    CT="Content-Type: application/vnd.kafka.json.v2+json"
    [ -z "${FINGRID_KEY:-}" ] && { echo "NO-KEY (set deblob-optim-keys.fingrid_key)"; exit 0; }
    START=$(date -u -d '-15 min' +%Y-%m-%dT%H:%M:%SZ 2>/dev/null || date -u +%Y-%m-%dT%H:%M:%SZ)
    END=$(date -u +%Y-%m-%dT%H:%M:%SZ)
    body=$(curl -sf -A "$UA" -H "x-api-key: $FINGRID_KEY" --max-time 25 \
      "https://data.fingrid.fi/api/datasets/177/data?startTime=$START&endTime=$END") || { echo "FETCH-FAIL"; exit 0; }
    echo "$body" | jq -c '{records:[(.data[]?)|{value:.}]}' | \
      curl -sf -X POST "$P" -H "$CT" --data-binary @- -o /dev/null -w "PRODUCED fingrid -> %{http_code}\n" || echo "PRODUCE-FAIL"
    echo done
---
