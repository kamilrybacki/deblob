apiVersion: v1
kind: ConfigMap
metadata: {name: deblob-console-nginx, namespace: deblob}
data:
  # Rendered by the nginx image entrypoint (envsubst) at boot: ${DEBLOB_API_TOKEN}
  # is substituted from the container env (sourced from Secret deblob-secrets).
  # NGINX_ENVSUBST_FILTER=DEBLOB_API_TOKEN (set on the Deployment) restricts
  # substitution to that one var, so nginx's own $host/$uri/$up survive intact.
  default.conf.template: |
    server {
      listen 8080;
      server_name _;
      # Declare UTF-8 so the console's glyphs (◐ ⚙ ◈ ≡ …) render correctly;
      # without it the browser guesses the encoding and mangles them.
      charset utf-8;
      root /usr/share/nginx/html;
      index console.html;
      # Never emit absolute redirects — behind Caddy/Cloudflare the pod's own
      # :8080 listen port would leak into the Location header and break the
      # external https://deblob.<domain>/ flow. Serve console.html at / directly.
      absolute_redirect off;
      # Request-time DNS for the in-cluster mgmt Service (name may not resolve at
      # boot / IP may change). $up is reused by every proxied location below.
      resolver 10.43.0.10 valid=30s;
      set $up deblob-mgmt.deblob.svc.cluster.local;

      # Pod readiness — nginx-only, independent of the mgmt API. The console must
      # stay Ready (and reachable) even when Deblob is down, so it can SHOW that.
      location = /_up { return 200 "ok\n"; }

      location = / { try_files /console.html =404; add_header Cache-Control "no-store"; }
      location / { try_files $uri /console.html; add_header Cache-Control "no-store"; }

      # Live-stream SSE — must be UNBUFFERED (the default proxy buffering would hold
      # the event-stream and the browser would see nothing). Exact-match wins over
      # the /api/v1/ prefix below. Long read timeout for the persistent connection.
      location = /api/v1/stream {
        proxy_pass http://$up:9615;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer ${DEBLOB_API_TOKEN}";
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
      }
      # Same-origin proxy to the live Deblob management API. No URI on proxy_pass
      # so the full /api/v1/... path is forwarded unchanged. The bearer token is
      # injected HERE, server side, so the browser never holds it — access is
      # gated by Authelia at the edge and the console auto-connects with no token.
      location /api/v1/ {
        proxy_pass http://$up:9615;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer ${DEBLOB_API_TOKEN}";
        # samples:read capability injected server-side (like the bearer above),
        # so console viewers gated by Authelia can view redacted samples without
        # holding the token. Harmless on non-samples routes (deblob ignores it).
        proxy_set_header X-Samples-Read-Token "${DEBLOB_SAMPLES_READ_TOKEN}";
        # Never cache API responses (samples are private, no-store).
        proxy_cache off;
      }
      # Mgmt liveness/readiness proxied through so the console's Operations tiles
      # reflect the REAL Deblob process, not nginx. These return plain text/empty,
      # so the console probes them by HTTP status, never by parsing JSON.
      location = /healthz {
        proxy_pass http://$up:9615/healthz;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer ${DEBLOB_API_TOKEN}";
      }
      location = /readyz {
        proxy_pass http://$up:9615/readyz;
        proxy_set_header Host $host;
        proxy_set_header Authorization "Bearer ${DEBLOB_API_TOKEN}";
      }
    }
