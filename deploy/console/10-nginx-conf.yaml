apiVersion: v1
kind: ConfigMap
metadata: {name: deblob-console-nginx, namespace: deblob}
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index console.html;
      location = / { return 302 /console.html; }
      location / { try_files $uri /console.html; add_header Cache-Control "no-store"; }
      # Same-origin proxy to the Deblob management API. Resolver + variable so
      # nginx defers DNS to request time: the console runs in demo mode and
      # this 502s harmlessly until a live Deblob (Service deblob-mgmt:8081)
      # exists in this namespace — no boot-time dependency.
      location /api/v1/ {
        resolver 10.43.0.10 valid=30s;
        set $deblob_api http://deblob-mgmt.deblob.svc.cluster.local:8081;
        proxy_pass $deblob_api/api/v1/;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
      }
      location = /healthz { return 200 "ok\n"; }
    }
