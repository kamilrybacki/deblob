apiVersion: v1
kind: ConfigMap
metadata: {name: deblob-console-nginx, namespace: deblob}
data:
  default.conf: |
    server {
      listen 8080;
      server_name _;
      root /usr/share/nginx/html;
      index console.html;
      # Never emit absolute redirects — behind Caddy/Cloudflare the pod's own
      # :8080 listen port would leak into the Location header and break the
      # external https://deblob.<domain>/ flow. Serve console.html at / directly.
      absolute_redirect off;
      location = / { try_files /console.html =404; add_header Cache-Control "no-store"; }
      location / { try_files $uri /console.html; add_header Cache-Control "no-store"; }
      # Same-origin proxy to the live Deblob management API. Resolver + variable
      # keep DNS at request time; no URI on proxy_pass so the full /api/v1/...
      # path is forwarded unchanged. Bearer token comes from the browser.
      location /api/v1/ {
        resolver 10.43.0.10 valid=30s;
        set $up deblob-mgmt.deblob.svc.cluster.local;
        proxy_pass http://$up:9615;
        proxy_set_header Host $host;
        proxy_set_header Authorization $http_authorization;
      }
      location = /healthz { return 200 "ok\n"; }
    }
