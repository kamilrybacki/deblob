apiVersion: v1
kind: ConfigMap
metadata: {name: redis-vault-conf, namespace: deblob}
data: {redis.conf: "appendonly yes\nappendfsync everysec\nmaxmemory-policy noeviction\nsave \"\"\ndir /data\n"}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: redis-vault, namespace: deblob, labels: {app: redis-vault}}
spec:
  replicas: 1
  strategy: {type: Recreate}
  selector: {matchLabels: {app: redis-vault}}
  template:
    metadata: {labels: {app: redis-vault}}
    spec:
      affinity: {nodeAffinity: {requiredDuringSchedulingIgnoredDuringExecution: {nodeSelectorTerms: [{matchExpressions: [{key: node-role.kubernetes.io/control-plane, operator: DoesNotExist}]}]}}}
      securityContext: {runAsNonRoot: true, runAsUser: 999, fsGroup: 999, seccompProfile: {type: RuntimeDefault}}
      containers:
      - name: redis
        image: redis:7.4-alpine
        args: [redis-server, /etc/redis/redis.conf]
        ports: [{name: redis, containerPort: 6379}]
        securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}}
        resources: {requests: {cpu: 100m, memory: 256Mi}, limits: {cpu: "1", memory: 2Gi}}
        readinessProbe: {exec: {command: [redis-cli, ping]}, initialDelaySeconds: 3, periodSeconds: 5}
        volumeMounts: [{name: conf, mountPath: /etc/redis}, {name: data, mountPath: /data}]
      volumes: [{name: conf, configMap: {name: redis-vault-conf}}, {name: data, persistentVolumeClaim: {claimName: redis-vault-data}}]
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata: {name: redis-vault-data, namespace: deblob}
spec:
  accessModes: [ReadWriteOnce]
  storageClassName: nfs
  resources: {requests: {storage: 2Gi}}
---
apiVersion: v1
kind: Service
metadata: {name: redis-vault, namespace: deblob, labels: {app: redis-vault}}
spec: {selector: {app: redis-vault}, ports: [{port: 6379, targetPort: 6379}]}
