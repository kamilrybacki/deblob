# SLM inference server for Deblob's cold-discovery lane — Ollama (CPU),
# OpenAI-compatible /v1/chat/completions. Serves Qwen2.5-0.5B (the arm-C base;
# the tuned LoRA adapter is a follow-up). The trust gate still requires
# deterministic corroboration before any SLM-proposed match is applied, so model
# quality never risks a false merge.
apiVersion: apps/v1
kind: Deployment
metadata: {name: ollama, namespace: deblob, labels: {app: ollama}}
spec:
  replicas: 1
  selector: {matchLabels: {app: ollama}}
  strategy: {type: Recreate}
  template:
    metadata: {labels: {app: ollama}}
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
            - matchExpressions:
              - {key: node-role.kubernetes.io/control-plane, operator: DoesNotExist}
      securityContext: {runAsNonRoot: true, runAsUser: 1000, fsGroup: 1000, seccompProfile: {type: RuntimeDefault}}
      containers:
      - name: ollama
        image: ollama/ollama:latest
        ports: [{name: http, containerPort: 11434}]
        env:
        - {name: OLLAMA_HOST, value: "0.0.0.0:11434"}
        - {name: OLLAMA_KEEP_ALIVE, value: "-1"}          # keep the 0.5B model resident
        - {name: OLLAMA_MAX_LOADED_MODELS, value: "1"}
        # Admission cap (jr-deblob-stability-231518): bound the pending-request
        # queue so an SLM burst (namer + decision lane) queues/rejects rather than
        # piling up unbounded contexts and OOM-cycling. SLM naming is optional
        # enrichment — it should degrade to the heuristic, never cascade.
        - {name: OLLAMA_MAX_QUEUE, value: "64"}
        # NUM_PARALLEL=1 (was 2): 2 concurrent 0.5B contexts + keep_alive=-1 pushed
        # RSS past the 3Gi limit -> OOMKilled 7x/day (diagnosed 2026-07-23). One
        # context halves peak memory; naming/decision requests queue briefly rather
        # than OOM-cycling (the benchmark showed prompt cost is low, so a short wait
        # beats a crash-loop). Raise back to 2 only alongside a higher memory limit.
        - {name: OLLAMA_NUM_PARALLEL, value: "1"}
        - {name: HOME, value: /home/ollama}
        securityContext: {allowPrivilegeEscalation: false, capabilities: {drop: [ALL]}}
        resources: {requests: {cpu: 500m, memory: 1Gi}, limits: {cpu: "4", memory: 3Gi}}
        # The models volume is an emptyDir (wiped on every pod restart), and Ollama
        # never re-pulls on its own — so a restart silently left the server with NO
        # model, making every namer SLM call return null and forcing 100% heuristic
        # naming (observed 2026-07-22). This postStart hook waits for `ollama serve`
        # to answer, then idempotently pulls the base model (instant no-op once
        # present) — self-healing on every start. Model quality never risks a false
        # merge (the trust gate needs deterministic corroboration), so a slow first
        # pull only delays naming, never correctness.
        lifecycle:
          postStart:
            exec:
              command: ["/bin/sh", "-c", "until ollama list >/dev/null 2>&1; do sleep 2; done; ollama pull qwen2.5:0.5b >/tmp/poststart-pull.log 2>&1 || true"]
        volumeMounts:
        - {name: models, mountPath: /home/ollama/.ollama}
        readinessProbe: {httpGet: {path: /, port: 11434}, initialDelaySeconds: 5, periodSeconds: 10}
      volumes:
      - {name: models, emptyDir: {sizeLimit: 4Gi}}
---
apiVersion: v1
kind: Service
metadata: {name: ollama, namespace: deblob, labels: {app: ollama}}
spec:
  selector: {app: ollama}
  ports: [{name: http, port: 11434, targetPort: 11434}]
