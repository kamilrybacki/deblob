apiVersion: v1
kind: ConfigMap
metadata: {name: deblob-config, namespace: deblob}
data:
  deblob.toml: |
    [kafka]
    raw_topic = "events.raw"
    # Per-source topics — the relay multi-subscribes; Envelope.source = the actual
    # consumed topic, giving per-collector lineage. events.raw kept for back-compat.
    raw_topics = ["events.raw", "events.grid.carbonintensity", "events.grid.energy-charts", "events.compute.azure", "events.compute.vast", "events.compute.runpod", "events.compute.gpu-prices", "events.ai.benchmarks", "events.ai.arena", "events.ai.papers", "events.hw.gpu-specs", "events.ai.evalplus", "events.compute.ovh", "events.compute.scaleway", "events.registry.crates", "events.registry.pypi", "events.registry.hf-models", "events.registry.hf-datasets", "events.registry.ollama", "events.registry.dockerhub", "events.registry.npm", "events.geo.quakes", "events.space.weather", "events.geo.flights", "events.weather.openmeteo", "events.weather.metno", "events.transit.gdansk", "events.env.imgw", "events.env.pegel", "events.env.gios", "events.env.dwd", "events.civic.wikidata", "events.ai.openalex", "events.compute.spot-advisor", "events.energy.cheapest-hours", "events.energy.awattar", "events.energy.prices-eu", "events.carbon.dk", "events.energy.pse-pl", "events.carbon.fr", "events.firehose.jetstream", "events.kg.wikidata"]
    tagged_topic = "events.tagged"
    discovery_topic = "deblob.discovery"
    quarantine_topic = "deblob.quarantine"
    group_id = "deblob"
    transactional_id = "deblob-relay-1"
    max_batch_records = 500
    max_batch_linger_ms = 100
    # Single-message ceiling; must match the Redpanda cluster kafka_batch_max_bytes
    # (8 MiB, set in 30-redpanda.yaml). Sized so a full [limits].max_bytes payload's
    # discovery record (payload embedded as a ~4x JSON byte-array) fits and FLOWS
    # rather than being skipped/quarantined by the relay produce-size guard.
    max_message_bytes = 8388608
    [limits]
    max_bytes = 1048576
    max_depth = 32
    max_fields_per_object = 1024
    [promotion]
    min_samples = 1
    min_age_ms = 0
    [management]
    addr = "0.0.0.0:9615"
    [slm]
    # SLM cold-discovery lane — decisions via the in-cluster Ollama (OpenAI-compatible,
    # CPU, Qwen2.5-0.5B). The trust gate still requires deterministic corroboration
    # before any SLM-proposed match is applied, so model quality never risks a merge.
    enabled = true
    base_url = "http://ollama.deblob.svc.cluster.local:11434/v1"
    model = "qwen2.5:0.5b"
    # CPU 0.5B inference is slow; give it headroom so the sweep doesn't 500 on the
    # 8s default (the trust gate never applies an SLM match without corroboration).
    timeout_ms = 25000
    [semantic]
    canonical_field_ids = ["cfid_timestamp","cfid_price","cfid_currency","cfid_region","cfid_latitude","cfid_longitude","cfid_carbon","cfid_power","cfid_name","cfid_entity_id","cfid_count","cfid_unit","cfid_value","cfid_status"]
    event_types = ["event.order.placed","event.user.created","event.sensor.reading","event.payment.captured"]
    [umbrella]
    # Value-bucket guard runs in SHADOW (records/logs, never blocks) unless
    # enforce_value_guard is turned on. min_value_support lowered from the 30
    # default because this homelab's grid collectors are low-volume (a dozen
    # observations per poll window) — 30 would leave the guard permanently
    # UNKNOWN on them.
    enforce_value_guard = false
    min_value_support = 5
    [samples]
    # Redacted troubleshooting sample capture (joint design dc-samples-dlp-1907).
    # OFF by default; enabled here ONLY for the low-risk PUBLIC grid/market
    # collectors (never a PII-bearing stream). Every sample is DLP-redacted
    # before storage into a DEDICATED VOLATILE Redis (DEBLOB_SAMPLES_REDIS_URL);
    # viewing needs the separate samples:read capability.
    enabled = true
    capture_sources = ["events.grid.carbonintensity", "events.grid.energy-charts", "events.compute.azure", "events.compute.vast", "events.compute.runpod", "events.compute.gpu-prices", "events.ai.benchmarks", "events.ai.arena", "events.ai.papers", "events.hw.gpu-specs", "events.ai.evalplus", "events.compute.ovh", "events.compute.scaleway", "events.registry.crates", "events.registry.pypi", "events.registry.hf-models", "events.registry.hf-datasets", "events.registry.ollama", "events.registry.dockerhub", "events.registry.npm", "events.geo.quakes", "events.space.weather", "events.geo.flights", "events.weather.openmeteo", "events.weather.metno", "events.transit.gdansk", "events.env.imgw", "events.env.pegel", "events.env.gios", "events.env.dwd", "events.civic.wikidata", "events.ai.openalex", "events.compute.spot-advisor", "events.energy.cheapest-hours", "events.energy.awattar", "events.energy.prices-eu", "events.carbon.dk", "events.energy.pse-pl", "events.carbon.fr"]
    max_per_candidate = 20
    retention_secs = 604800
    max_sample_bytes = 8192
    [auto_promote]
    # Automatic candidate promotion (reviewed hardening: security + rust + Codex).
    # DEFAULT-DENY by source: enabled ONLY for this homelab's OWN trusted grid/
    # market producers (the same PUBLIC, non-PII streams as [samples]), never the
    # generic events.raw ingest — so only the operator's own topics can ever be
    # auto-published. Thresholds are strict (>= the [promotion] guards): a
    # candidate needs 50 samples over 10 min AND a settled required-leaf shape
    # before it is published with no human in the loop.
    enabled = true
    allowed_sources = ["events.grid.carbonintensity", "events.grid.energy-charts", "events.compute.azure", "events.compute.vast", "events.compute.runpod", "events.compute.gpu-prices", "events.ai.benchmarks", "events.ai.arena", "events.ai.papers", "events.hw.gpu-specs", "events.ai.evalplus", "events.compute.ovh", "events.compute.scaleway", "events.registry.crates", "events.registry.pypi", "events.registry.hf-models", "events.registry.hf-datasets", "events.registry.ollama", "events.registry.dockerhub", "events.registry.npm", "events.geo.quakes", "events.space.weather", "events.geo.flights", "events.weather.openmeteo", "events.weather.metno", "events.transit.gdansk", "events.env.imgw", "events.env.pegel", "events.env.gios", "events.env.dwd", "events.civic.wikidata", "events.ai.openalex", "events.compute.spot-advisor", "events.energy.cheapest-hours", "events.energy.awattar", "events.energy.prices-eu", "events.carbon.dk", "events.energy.pse-pl", "events.carbon.fr"]
    min_samples = 50
    min_age_ms = 600000
    min_required_fields = 2
    min_required_ratio = 0.5
    sweep_interval_ms = 60000
    max_promotions_per_tick = 20
