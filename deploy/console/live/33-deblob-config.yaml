apiVersion: v1
kind: ConfigMap
metadata: {name: deblob-config, namespace: deblob}
data:
  deblob.toml: |
    [kafka]
    raw_topic = "events.raw"
    # Per-source topics — the relay multi-subscribes; Envelope.source = the actual
    # consumed topic, giving per-collector lineage. events.raw kept for back-compat.
    raw_topics = ["events.raw", "events.grid.carbonintensity", "events.grid.energy-charts", "events.compute.azure"]
    tagged_topic = "events.tagged"
    discovery_topic = "deblob.discovery"
    quarantine_topic = "deblob.quarantine"
    group_id = "deblob"
    transactional_id = "deblob-relay-1"
    max_batch_records = 500
    max_batch_linger_ms = 100
    [limits]
    max_bytes = 1048576
    max_depth = 32
    max_fields_per_object = 1024
    [promotion]
    min_samples = 1
    min_age_ms = 0
    [management]
    addr = "0.0.0.0:9615"
    [slm]
    # SLM cold-discovery lane — decisions via the in-cluster Ollama (OpenAI-compatible,
    # CPU, Qwen2.5-0.5B). The trust gate still requires deterministic corroboration
    # before any SLM-proposed match is applied, so model quality never risks a merge.
    enabled = true
    base_url = "http://ollama.deblob.svc.cluster.local:11434/v1"
    model = "qwen2.5:0.5b"
    # CPU 0.5B inference is slow; give it headroom so the sweep doesn't 500 on the
    # 8s default (the trust gate never applies an SLM match without corroboration).
    timeout_ms = 25000
    [semantic]
    canonical_field_ids = ["cfid_amount","cfid_currency","cfid_user_id","cfid_order_id","cfid_status","cfid_timestamp"]
    event_types = ["event.order.placed","event.user.created","event.sensor.reading","event.payment.captured"]
    [umbrella]
    # Value-bucket guard runs in SHADOW (records/logs, never blocks) unless
    # enforce_value_guard is turned on. min_value_support lowered from the 30
    # default because this homelab's grid collectors are low-volume (a dozen
    # observations per poll window) — 30 would leave the guard permanently
    # UNKNOWN on them.
    enforce_value_guard = false
    min_value_support = 5
