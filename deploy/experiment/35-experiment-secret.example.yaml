# TEMPLATE ONLY — placeholders. Copy to `35-experiment-secret.yaml`
# (gitignored — see /.gitignore's `deploy/experiment/35-experiment-secret.yaml`
# entry), fill in real values, and `kubectl apply -f` it BEFORE
# `90-experiment-job.yaml`. Never commit the filled-in version; never put
# a real value in this `.example.yaml` file.
#
# Consumed env-only (never baked into an image or ConfigMap):
#   - MODAL_TOKEN_ID / MODAL_TOKEN_SECRET: the CHOSEN arm-C backend's
#     headless token pair (crates/deblob-experiment/src/continual/
#     training_job/modal.rs's `ModalCredentials::from_env` reads these two
#     names literally — see `MODAL_TOKEN_ID_ENV`/`MODAL_TOKEN_SECRET_ENV`).
#     Generate at modal.com -> Settings -> API Tokens (a non-interactive
#     token pair, no browser flow needed at submit/poll time). Same pair
#     also authenticates `modal deploy deploy/experiment/modal/
#     trainer.py` when (re)deploying the trainer app itself.
#   - HF_TOKEN: authenticates the `hf` CLI itself (crates/deblob-experiment/
#     src/continual/training_job/hf_jobs.rs's `HfJobsBackend` shells out to
#     `hf jobs run ...` from the experiment Job's own pod) — only needed if
#     `backend = "hfjobs"` in `30-experiment-config.yaml` (the kept-working
#     fallback; Modal is the chosen default). This is DIFFERENT from that
#     ConfigMap's (commented-out, hfjobs-only) `hf_token_secret_ref`, which
#     names an HF-side secret the REMOTE job itself receives — this env
#     var only authenticates the local `hf` CLI call.
#   - FINE_TUNE_API_KEY: placeholder for any FUTURE third TrainingBackend
#     (spec §8: "the REMOTE fine-tune backend ... is pluggable"). Leave
#     blank/omit if unused; do not wire it to anything until a third
#     backend actually exists.
apiVersion: v1
kind: Secret
metadata:
  name: deblob-experiment-secrets
  namespace: deblob-experiment
type: Opaque
stringData:
  MODAL_TOKEN_ID: "REPLACE_ME_ak-xxxxxxxxxxxxxxxxxxxxxxxx"
  MODAL_TOKEN_SECRET: "REPLACE_ME_as-xxxxxxxxxxxxxxxxxxxxxxxx"
  HF_TOKEN: "REPLACE_ME_hf_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
  FINE_TUNE_API_KEY: "REPLACE_ME_optional_unused_by_default"
