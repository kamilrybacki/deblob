name: ci
on: { push: { branches: [main] }, pull_request: {} }
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # `rdkafka-sys` (pulled by `deblob-kafka`) builds the vendored librdkafka
      # from source, which needs curl/ssl/sasl/zstd dev headers — absent on the
      # bare `ubuntu-latest` image, so `clippy --all-targets`/`test` fail at the
      # native build (`fatal error: curl/curl.h`). Install them before any cargo
      # step that compiles the kafka crate.
      - run: sudo apt-get update && sudo apt-get install -y libcurl4-openssl-dev libssl-dev libsasl2-dev libzstd-dev
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: bash scripts/lint-no-payload-logs.sh
      # Covers the FULL workspace, including `deblob-semantic` (pure, no
      # Docker: `digest_it.rs`/`signature_it.rs`) and every Docker-gated
      # `deblob`/`deblob-redis` integration test — P2-D's `semantic_it.rs`,
      # `semantic_drift_it.rs`, `semantic_neighbors_it.rs`, and the Task 8
      # capstone `semantic_capstone_it.rs` all run here exactly like every
      # pre-existing testcontainers-backed IT (`e2e_it.rs`, `relay_it.rs`,
      # `chaos_it.rs`, ...): `ubuntu-latest` GH runners ship Docker already,
      # so no extra `services:` block is needed, and no crate/test is
      # excluded from `--workspace`.
      - run: cargo test --workspace
      # Explicit, isolated run of the eval harness (corpus loader + metrics
      # + the wiremock end-to-end self-test, deblob-p2ab Task 8). Already
      # covered by `cargo test --workspace` above; kept as its own step so
      # a harness regression is visible at a glance in CI logs without
      # scrolling the full workspace test output. No real model is ever
      # contacted here — see crates/deblob-eval/tests/eval_it.rs.
      - run: cargo test -p deblob-eval
      - uses: taiki-e/install-action@cargo-audit
      # Two transitive advisories are ignored — both with no safe fix and no
      # exposure on any production path; every OTHER advisory (incl. any new
      # one) still fails the build:
      #  - RUSTSEC-2025-0111 (tokio-tar, PAX-header file smuggling): DEV-only
      #    (testcontainers unpacks test-container images); no fixed version exists.
      #  - RUSTSEC-2024-0437 (protobuf 2.x, recursion crash on parse): pulled
      #    only by `prometheus 0.13` to ENCODE our own metrics — we never parse
      #    untrusted protobuf. The fix (prometheus 0.14 → protobuf 3.7.2) breaks
      #    the metrics proto-accessor API in tests; deferred as its own change.
      - run: cargo audit --ignore RUSTSEC-2025-0111 --ignore RUSTSEC-2024-0437
