<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Deblob — Console</title>
<style>
  :root{

  *{box-sizing:border-box}

  .brand{display:flex;align-items:center;gap:10px;font-weight:680;letter-spacing:-.01em;font-size:16px}

  .pill.demo{background:var(--warn-soft);color:var(--warn)} .pill.demo .led{background:var(--warn)}
  .pill.ro{background:var(--accent-soft);color:var(--accent-ink)} .pill.ro .led{background:var(--accent)}
  .pill.mut{background:var(--risk-soft);color:var(--risk)} .pill.mut .led{background:var(--risk)}
  .top .sp{flex:1}

  .iconbtn:hover{border-color:var(--line2);color:var(--ink)}

  nav a:hover{background:var(--panel-2);color:var(--ink)}
  nav a.on{background:var(--accent-soft);color:var(--accent-ink);font-weight:620}
  nav a .ic{width:17px;text-align:center;opacity:.85}
  nav .grp{font-size:10.5px;font-family:var(--mono);letter-spacing:.08em;text-transform:uppercase;color:var(--faint);padding:14px 12px 5px}
  nav .foot{margin-top:auto;font-size:11px;color:var(--faint);padding:10px 12px;line-height:1.5}
  nav .foot a{display:inline;padding:0;color:var(--accent);font-weight:500}
  main{padding:22px clamp(16px,3vw,30px);min-width:0;overflow-x:hidden}
  .pagehead{margin:0 0 18px}
  .pagehead h1{font-size:21px;margin:0 0 4px;letter-spacing:-.01em;font-weight:660}
  .pagehead p{margin:0;color:var(--ink2);font-size:13px;max-width:70ch}
  .grid{display:grid;gap:14px}
  .cols4{grid-template-columns:repeat(4,1fr)} .cols3{grid-template-columns:repeat(3,1fr)} .cols2{grid-template-columns:1fr 1fr}
  @media(max-width:900px){.cols4{grid-template-columns:1fr 1fr}.cols3,.cols2{grid-template-columns:1fr}}
  @media(max-width:640px){.app{grid-template-columns:1fr}nav{display:none}.cols4{grid-template-columns:1fr 1fr}}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px;box-shadow:var(--sh)}
  .stat .k{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin:0 0 9px}
  .stat .v{font-family:var(--mono);font-size:26px;font-weight:640;letter-spacing:-.02em;line-height:1}
  .stat .s{font-size:11.5px;color:var(--ink2);margin:8px 0 0}
  .stat .v.good{color:var(--good)} .stat .v.risk{color:var(--risk)} .stat .v.accent{color:var(--accent)}
  h2.sec{font-size:12px;font-family:var(--mono);letter-spacing:.09em;text-transform:uppercase;color:var(--faint);margin:24px 0 12px;display:flex;align-items:center;gap:10px}
  h2.sec::after{content:"";flex:1;height:1px;background:var(--line)}
  /* explorer trace */
  .tabs{display:flex;gap:6px;flex-wrap:wrap;margin:0 0 14px}
  .tab{font-size:12.5px;padding:7px 13px;border:1px solid var(--line);border-radius:8px;background:var(--panel);color:var(--ink2);cursor:pointer;font-family:var(--sans)}
  .tab:hover{border-color:var(--line2)} .tab.on{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-ink);font-weight:600}
  .trace{display:flex;flex-direction:column;gap:0}
  .step{display:grid;grid-template-columns:44px 1fr;gap:14px;position:relative}
  .step .rail{display:flex;flex-direction:column;align-items:center}
  .step .node{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-family:var(--mono);font-size:12px;font-weight:700;background:var(--panel-2);border:1.5px solid var(--line2);color:var(--ink2);z-index:1}
  .step .line{flex:1;width:2px;background:var(--line);margin:2px 0}
  .step:last-child .line{display:none}
  .step .body{padding:0 0 16px}
  .step .lbl{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);margin:4px 0 6px}
  .step.pass .node{background:var(--good-soft);border-color:var(--good);color:var(--good)}
  .step.stop .node{background:var(--risk-soft);border-color:var(--risk);color:var(--risk)}
  .step.new .node{background:var(--accent-soft);border-color:var(--accent);color:var(--accent-ink)}
  .step.hold .node{background:var(--warn-soft);border-color:var(--warn);color:var(--warn)}
  .retr{display:grid;grid-template-columns:150px 1fr 52px;gap:10px;align-items:center;margin:0 0 5px;font-size:12.5px}
  .retr .tk{background:var(--track);height:15px;border-radius:4px;overflow:hidden}
  .retr .fl{height:100%;background:var(--accent)} .retr .fl.close{background:var(--good)}
  .retr .v{font-family:var(--mono);font-size:11px;text-align:right;color:var(--ink2)}
  .propose{font-size:13px} .propose b{font-family:var(--mono)}
  .final{font-weight:640;font-size:14px;display:inline-flex;align-items:center;gap:8px}
  .final.good{color:var(--good)} .final.risk{color:var(--risk)} .final.accent{color:var(--accent-ink)} .final.warn{color:var(--warn)}
  .split{display:grid;grid-template-columns:320px 1fr;gap:16px;align-items:start}
  @media(max-width:820px){.split{grid-template-columns:1fr}}
  .listcard{background:var(--panel);border:1px solid var(--line);border-radius:13px;overflow:hidden;box-shadow:var(--sh)}
  .search{padding:10px;border-bottom:1px solid var(--line)}
  .search input{width:100%;border:1px solid var(--line);background:var(--sunk);border-radius:8px;padding:8px 11px;font-size:13px;color:var(--ink);font-family:var(--sans)}
  .search input:focus{outline:none;border-color:var(--accent)}
  .rowlist{max-height:70vh;overflow-y:auto}
  .row{padding:11px 14px;border-bottom:1px solid var(--line);cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:8px}
  .row:hover{background:var(--panel-2)} .row.on{background:var(--accent-soft)}
  .row .lab{font-weight:580;font-size:13.5px}
  .row .meta{font-family:var(--mono);font-size:10.5px;color:var(--faint)}
  .row .cnt{font-family:var(--mono);font-size:11px;color:var(--ink2);background:var(--sunk);padding:2px 7px;border-radius:6px}
  .field{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center;padding:7px 0;border-bottom:1px solid var(--line);font-size:13px}
  .field:last-child{border-bottom:none}
  .field .fp{font-family:var(--mono);font-size:12.5px} .field .fp .dot{color:var(--faint)}
  .ty{font-family:var(--mono);font-size:10.5px;padding:2px 7px;border-radius:5px;background:var(--sunk);color:var(--ink2)}
  .ty.string{color:var(--accent)} .ty.number{color:var(--good)} .ty.object{color:var(--warn)} .ty.array{color:var(--risk)}
  .tag{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 7px;border-radius:5px}
  .tag.public{background:var(--good-soft);color:var(--good)} .tag.internal{background:var(--accent-soft);color:var(--accent-ink)} .tag.restricted{background:var(--risk-soft);color:var(--risk)}
  .kv{display:grid;grid-template-columns:auto 1fr;gap:6px 14px;font-size:12.5px;margin:12px 0}
  .kv dt{color:var(--faint);font-family:var(--mono);font-size:11px}
  .kv dd{margin:0;font-family:var(--mono);font-size:11.5px;word-break:break-all}
  .muted{color:var(--faint)}
  .nb{display:grid;grid-template-columns:150px 1fr 52px;gap:10px;align-items:center;margin:0 0 8px}
  .nb .lab{font-size:12.5px} .nb .tk{background:var(--track);height:18px;border-radius:5px;overflow:hidden}
  .nb .fl{height:100%;background:var(--accent);border-radius:5px} .nb .fl.close{background:var(--good)}
  .nb .v{font-family:var(--mono);font-size:11.5px;text-align:right;color:var(--ink2)}
  .cand{background:var(--panel);border:1px solid var(--line);border-radius:13px;padding:16px;box-shadow:var(--sh);margin-bottom:14px}
  .cand .h{display:flex;justify-content:space-between;align-items:start;gap:12px;margin-bottom:10px}
  .cand .fields{display:flex;flex-wrap:wrap;gap:6px;margin:6px 0 12px}
  .chip{font-family:var(--mono);font-size:11px;background:var(--sunk);border:1px solid var(--line);padding:3px 8px;border-radius:6px;color:var(--ink2)}
  .verdict{border-radius:9px;padding:10px 13px;font-size:12.5px;display:flex;gap:10px;align-items:start}
  .verdict.apply{background:var(--good-soft)} .verdict.new{background:var(--accent-soft)} .verdict.human{background:var(--warn-soft)}
  .verdict .icn{font-family:var(--mono);font-weight:700}
  .dec{font-family:var(--mono);font-size:11px;font-weight:600;padding:3px 9px;border-radius:6px}
  .dec.match{background:var(--accent-soft);color:var(--accent-ink)} .dec.new{background:var(--good-soft);color:var(--good)} .dec.abstain{background:var(--warn-soft);color:var(--warn)}
  .actions{display:flex;gap:8px;margin-top:12px}
  .btn{border:1px solid var(--line2);background:var(--panel);color:var(--ink);border-radius:8px;padding:7px 14px;font-size:12.5px;font-weight:560;cursor:pointer;font-family:var(--sans)}
  .btn:hover{background:var(--panel-2)} .btn:disabled{opacity:.45;cursor:not-allowed}
  .btn.good{border-color:var(--good);color:var(--good)} .btn.good:hover{background:var(--good-soft)}
  .btn.risk{border-color:var(--risk);color:var(--risk)} .btn.risk:hover{background:var(--risk-soft)}
  table{width:100%;border-collapse:collapse;font-size:13px}
  .tw{overflow-x:auto;border:1px solid var(--line);border-radius:12px;background:var(--panel);box-shadow:var(--sh)}
  th,td{padding:10px 14px;text-align:left;border-bottom:1px solid var(--line);white-space:nowrap}
  thead th{font-family:var(--mono);font-size:10.5px;letter-spacing:.05em;text-transform:uppercase;color:var(--faint);background:var(--panel-2);font-weight:600}
  tbody tr:last-child td{border-bottom:none}
  td .num{font-size:12.5px}
  svg{display:block;width:100%;height:auto;overflow:visible} svg text{font-family:var(--mono)}
  .glegend{display:flex;gap:16px;margin-top:12px;font-size:12px;color:var(--ink2);flex-wrap:wrap}
  .glegend span{display:inline-flex;align-items:center;gap:7px} .glegend .ln{width:20px;height:2px;display:inline-block}
  .modal-bg{position:fixed;inset:0;background:rgba(10,12,18,.5);display:grid;place-items:center;z-index:50;padding:16px}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;max-width:480px;width:100%;box-shadow:var(--sh2)}

  .modal .row2{display:flex;gap:8px;justify-content:flex-end;margin-top:18px}
  .toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--bg);padding:11px 18px;border-radius:10px;font-size:13px;z-index:60;box-shadow:var(--sh2);opacity:0;transition:opacity .2s,transform .2s}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
  .banner{border-radius:10px;padding:9px 14px;font-size:12.5px;margin:0 0 16px;display:flex;gap:9px;align-items:center}
  .banner.demo{background:var(--warn-soft);color:var(--warn)} .banner.ro{background:var(--accent-soft);color:var(--accent-ink)} .banner.mut{background:var(--risk-soft);color:var(--risk)}
  .empty{text-align:center;color:var(--faint);padding:40px;font-size:13px}

  .mxwrap{overflow-x:auto}
  .mx-t{border-collapse:separate;border-spacing:3px;font-size:11.5px}
  .mx-t th{font-weight:600;color:var(--ink2);font-size:11px;padding:2px 6px;white-space:nowrap}
  .mx-t th.l{text-align:right} .mx-t th.d{transform:rotate(-35deg);transform-origin:left bottom;height:52px;vertical-align:bottom;text-align:left}
  .mx{width:46px;height:30px;text-align:center;border-radius:6px;font-family:var(--mono);font-variant-numeric:tabular-nums;color:var(--ink)}
  .mx.self{background:repeating-linear-gradient(45deg,var(--sunk),var(--sunk) 4px,var(--panel-2) 4px,var(--panel-2) 8px);color:var(--faint)}
  .mx.none{background:var(--sunk);color:var(--faint)}
  .mx.close{background:var(--good-soft);color:var(--good)} .mx.mid{background:var(--accent-soft);color:var(--accent-ink)} .mx.far{background:var(--track);color:var(--ink2)}
  .mxleg{display:flex;gap:14px;margin-top:12px;font-size:11.5px;color:var(--ink2);flex-wrap:wrap}
  .mxleg span{display:inline-flex;align-items:center;gap:6px} .mxleg i{width:14px;height:14px;border-radius:4px;display:inline-block}
</style>

<script>
"use strict";
const $=s=>document.querySelector(s), $$=s=>[...document.querySelectorAll(s)];
// base URL is not secret -> localStorage; token IS secret -> sessionStorage only (Hermes).
const state={live:false,base:localStorage.getItem('deblob.base')||window.location.origin,token:sessionStorage.getItem('deblob.token')||'',data:null,sel:{},tab:0};
const esc=s=>String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

function toast(m){const t=$('#toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove('show'),2600);}
const canMutate=()=>state.live&&!!state.token;

async function api(path,opts){
  if(!state.base) throw new Error('no base');
  const h={'Accept':'application/json'};
  if(state.token) h['Authorization']='Bearer '+state.token;
  if(opts&&opts.body) h['Content-Type']='application/json';
  const r=await fetch(state.base.replace(/\/$/,'')+path,{...opts,headers:h});
  if(!r.ok) throw new Error('HTTP '+r.status);
  return r.status===204?null:r.json();
}
async function loadData(){
  if(state.base){
    try{
      const [sch,cand]=await Promise.all([api('/api/v1/schemas?limit=200'),api('/api/v1/candidates?state=provisional').catch(()=>({data:[]}))]);
      const fams=(sch.data||[]).map(r=>({family_id:r.family_id,schema_id:r.schema_id,version:r.version,
        // Fallback label: family_ids are UUIDv7 (timestamp-prefixed), so families
        // created in the same window share their leading segment — slicing the
        // PREFIX makes them collide. Use the distinctive random tail instead.
        label:(r.provenance&&r.provenance.label)||('fam-'+r.family_id.slice(-6)),
        observation_count:(r.provenance&&r.provenance.observation_count)||0,
        fields:canonToFields(r.canonical),semantic_fingerprint:r.semantic_fingerprint||null,
        privacy_class:r.privacy_class||'internal',canonicalizer:r.canonicalizer}));
      state.data={...JSON.parse(JSON.stringify(window.DEMO)),families:fams,neighbors:{},candidates:(cand.data||[]).map(normCand),quarantine:[],
        metrics:{...window.DEMO.metrics,schemas:fams.length,families:new Set(fams.map(f=>f.family_id)).size,candidates_pending:(cand.data||[]).length}};
      state.live=true; return;
    }catch(e){ /* fall through to demo */ }
  }
  state.data=JSON.parse(JSON.stringify(window.DEMO)); state.live=false;
}
// Deblob's canonical shape is a node tree: {optional, types:[...],
// children:{<name>:node}, array_elem?:node}. Walk children into dotted-path
// leaf fields — NOT a naive object walk (which would surface the node's own
// metadata keys `optional`/`types`/`children` as if they were fields).
function canonToFields(canon){
  try{const root=typeof canon==='string'?JSON.parse(canon):canon;const out=[];
    const leafType=n=>{const ts=n.types||[];
      if(n.array_elem||ts.includes('array'))return 'array';
      return ts.find(t=>t!=='null')||ts[0]||'unknown';};
    (function walk(node,pre){const ch=node&&node.children||{};
      for(const k of Object.keys(ch)){const c=ch[k],path=pre?pre+'.'+k:k;
        const ts=c.types||[];const nullable=!!c.optional||ts.includes('null');
        if(c.children&&Object.keys(c.children).length&&ts.includes('object'))walk(c,path);
        else out.push({path,type:leafType(c),nullable});}})(root,'');
    return out.slice(0,60);}catch(e){return[];}
}
// Live candidates come back as a structural profile (profile.root.children),
// not the demo's flat {fields, slm_decision, gate...}. Normalise so candCard —
// and the rest of the UI — see a uniform shape. The SLM decision/gate fields
// are absent when the discovery lane is disabled, so they get neutral defaults.
function ndType(n){ if(!n) return 'unknown';
  if(n.array_elem||n.array_empty_seen||n.array_partial_seen) return 'array';
  if(n.children&&Object.keys(n.children).length) return 'object';
  const t=n.types||{}; let best='',bc=-1; for(const k in t){ if(k==='null')continue; if(t[k]>bc){bc=t[k];best=k;} }
  return best||'unknown'; }
function profileToFields(profile){ const out=[]; const root=(profile&&profile.root)||{};
  (function walk(node,pre){ const ch=node.children||{}; for(const k of Object.keys(ch)){ const c=ch[k],path=pre?pre+'.'+k:k;
    if(c.children&&Object.keys(c.children).length) walk(c,path); else out.push({path,type:ndType(c)}); } })(root,'');
  return out.slice(0,40); }
function normCand(c){ if(!c||!c.profile) return c; // already demo-shaped
  return {candidate_id:c.candidate_id,
    observation_count:(c.sample_count!=null?c.sample_count:(c.profile.count||0)),
    fields:profileToFields(c.profile),
    slm_decision:c.slm_decision||'unclassified', slm_novelty:'', slm_relation:'', slm_cause:'structural cluster',
    gate:c.gate||c.state||'provisional',
    reason:c.reason||'Structural candidate awaiting review — the SLM decision lane is disabled in this deployment.',
    top1_distance:(c.top1_distance!=null?c.top1_distance:'—'), margin:(c.margin!=null?c.margin:'—'),
    match_label:c.match_label}; }
// --- OpenAPI export -------------------------------------------------------
// Turn a learned family's flat canonical field list ({path,type,nullable}) into
// a nested JSON Schema, then wrap N families as OpenAPI 3.1 components.schemas.
// Fully client-side (Blob download) — no network, CSP-safe.
function oapiType(t){switch(t){case 'number':return {type:'number'};case 'array':return {type:'array',items:{}};case 'object':return {type:'object'};case 'bool':case 'boolean':return {type:'boolean'};case 'null':return {type:'null'};default:return {type:'string'};}}
function fieldsToJsonSchema(fields){
  const root={type:'object',properties:{}};
  (fields||[]).forEach(fd=>{const parts=String(fd.path).split('.');let node=root;
    parts.forEach((p,i)=>{node.properties=node.properties||{};
      if(i===parts.length-1){node.properties[p]=oapiType(fd.type);
        if(!fd.nullable){node.required=node.required||[];if(!node.required.includes(p))node.required.push(p);}}
      else{if(!node.properties[p]||node.properties[p].type!=='object')node.properties[p]={type:'object',properties:{}};node=node.properties[p];}});});
  return root;
}
function buildOpenAPI(families){
  const schemas={},seen={};
  families.forEach(f=>{let name=(f.label||f.schema_id).replace(/[^A-Za-z0-9_.-]/g,'_')||'schema';
    if(seen[name])name+='_'+(++seen[name]);else seen[name]=1;
    schemas[name]={title:f.label,description:`Deblob family ${f.family_id} · schema ${f.schema_id} · v${f.version} · ${f.observation_count} obs`,
      'x-deblob-schema-id':f.schema_id,'x-deblob-family-id':f.family_id,'x-deblob-version':f.version,
      ...fieldsToJsonSchema(f.fields)};});
  return {openapi:'3.1.0',info:{title:'Deblob learned schemas',version:'1.0.0',
    description:`Exported from the Deblob console — ${families.length} schema${families.length===1?'':'s'} discovered from event streams. Each component is a canonical shape; x-deblob-* keys carry the registry identity.`,
    'x-generated-at':new Date().toISOString()},paths:{},components:{schemas}};
}
function downloadJSON(filename,obj){const blob=new Blob([JSON.stringify(obj,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=filename;
  document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(url),1500);}
function exportOpenAPI(id){const fams=state.data.families||[];
  if(id==='all'){if(!fams.length){toast('No schemas to export');return;}downloadJSON('deblob-schemas.openapi.json',buildOpenAPI(fams));toast(`Exported ${fams.length} schema${fams.length===1?'':'s'} as OpenAPI`);}
  else{const f=fams.find(x=>x.schema_id===id);if(f){downloadJSON(`deblob-${(f.label||'schema').replace(/[^A-Za-z0-9_.-]/g,'_')}.openapi.json`,buildOpenAPI([f]));toast('Exported schema as OpenAPI');}}
}
function setMode(){const el=$('#mode');
  if(!state.live){el.className='pill demo';el.innerHTML='<span class="led"></span>DEMO DATA';}
  else if(canMutate()){el.className='pill mut';el.innerHTML='<span class="led"></span>LIVE · MUTATION';}
  else{el.className='pill ro';el.innerHTML='<span class="led"></span>LIVE · READ-ONLY';}
}
function banner(){
  if(!state.live) return '<div class="banner demo">◆ Demo data — representative bundled schemas. Mutations disabled; connect a live instance to act.</div>';
  if(!canMutate()) return '<div class="banner ro">◆ Live, read-only — no bearer token set, so promote/reject are disabled.</div>';
  return '<div class="banner mut">◆ Live with mutation — promote/reject will write to the registry. The API still enforces auth and audit.</div>';
}

const V={};
V.explorer=()=>{const m=state.data.metrics;
  const card=(k,v,s,cls='')=>`<div class="card stat"><p class="k">${k}</p><div class="v ${cls} num">${v}</div><p class="s">${s}</p></div>`;
  const tr=state.data.explorer[state.tab]||state.data.explorer[0];
  return `<div class="pagehead"><h1>Why did Deblob assign this event to this schema?</h1><p>One event, traced through the authority boundary: structural retrieval proposes candidates, the model proposes a decision, and a deterministic gate corroborates or defers. The model is never the authority.</p></div>
  <div class="tabs">${state.data.explorer.map((t,i)=>`<button class="tab ${i===state.tab?'on':''}" data-tab="${i}">${esc(t.tab)}</button>`).join('')}</div>
  <div class="card">${traceView(tr)}</div>
  <h2 class="sec">At a glance</h2>
  <div class="grid cols4">
    ${card('Learned schemas',m.schemas,'distinct canonical shapes')}
    ${card('Families',m.families,'grouped identities')}
    ${card('Discovery queue',m.candidates_pending,'awaiting a decision','accent')}
    ${card('Relay',(m.relay_rec_s??598)+'/s','exactly-once, healthy','good')}
  </div>`;
};
function traceView(t){
  const retr=t.retrieval.map(r=>`<div class="retr"><div>${esc(r.label)}</div><div class="tk"><div class="fl ${r.dist<0.5?'close':''}" style="width:${(1-r.dist)*100}%"></div></div><div class="v">${r.dist.toFixed(2)}</div></div>`).join('');
  const gcls=t.gate.pass?'pass':(t.final.cls==='accent'?'new':t.final.cls==='warn'?'hold':'stop');
  const gi=t.gate.pass?'✓':(t.final.cls==='accent'?'✧':t.final.cls==='warn'?'⏸':'✕');
  return `<div class="trace">
    <div class="step"><div class="rail"><div class="node">1</div><div class="line"></div></div><div class="body"><div class="lbl">Event · redacted structural shape</div><div><code>${esc(t.shape)}</code></div></div></div>
    <div class="step"><div class="rail"><div class="node">2</div><div class="line"></div></div><div class="body"><div class="lbl">Deterministic retrieval · nearest families (distance, lower = closer)</div>${retr}</div></div>
    <div class="step"><div class="rail"><div class="node">3</div><div class="line"></div></div><div class="body"><div class="lbl">Model proposal · finite-scored, catalogue-constrained</div><div class="propose"><b>${esc(t.slm.decision)}</b> — ${esc(t.slm.relation)}</div></div></div>
    <div class="step ${gcls}"><div class="rail"><div class="node">${gi}</div><div class="line"></div></div><div class="body"><div class="lbl">Trust gate · deterministic corroboration</div><div style="font-size:12.5px;color:var(--ink2)">${esc(t.gate.text)}</div></div></div>
    <div class="step ${gcls}"><div class="rail"><div class="node">→</div></div><div class="body"><div class="lbl">Final action</div><div class="final ${t.final.cls}">${esc(t.final.action)}</div></div></div>
  </div>`;
}

V.schemas=()=>{const list=state.data.families;
  if(!state.sel.schema&&list[0])state.sel.schema=list[0].schema_id;
  return `<div class="pagehead"><div style="display:flex;justify-content:space-between;align-items:end;gap:16px;flex-wrap:wrap"><div><h1>Schema catalogue</h1><p>${list.length} learned schemas. Physical <code>sch_</code> identity and, where annotated, the semantic <code>sem_</code> fingerprint. Select one to inspect its canonical field shape.</p></div><button class="btn" data-act="export-oapi" data-id="all" ${list.length?'':'disabled'} title="Download every learned schema as an OpenAPI 3.1 document">⬇ Export all · OpenAPI</button></div></div>
  <div class="split">
    <div class="listcard"><div class="search"><input id="schsearch" placeholder="Search schemas…" autocomplete="off"></div><div class="rowlist" id="schrows">${schemaRows(list)}</div></div>
    <div id="schdetail">${schemaDetail(list.find(f=>f.schema_id===state.sel.schema))}</div>
  </div>`;
};
function schemaRows(list){return list.map(f=>`<div class="row ${f.schema_id===state.sel.schema?'on':''}" data-sch="${f.schema_id}"><div><div class="lab">${esc(f.label)}</div><div class="meta">${shortId(f.schema_id)}</div></div><span class="cnt">${f.observation_count} obs</span></div>`).join('')||'<div class="empty">No schemas</div>';}
function schemaDetail(f){if(!f)return '<div class="card empty">Select a schema</div>';
  const fields=f.fields.map(x=>`<div class="field"><span class="fp">${x.path.split('.').map((p,i)=>i?'<span class="dot">.</span>'+esc(p):esc(p)).join('')}</span><span class="ty ${x.type}">${x.type}</span><span class="muted" style="font-size:11px">${x.nullable?'nullable':'required'}</span></div>`).join('');
  return `<div class="card"><div style="display:flex;justify-content:space-between;align-items:start;gap:12px;margin-bottom:4px"><div><h2 style="margin:0;font-size:18px">${esc(f.label)}</h2><div class="muted num" style="font-size:11px;margin-top:3px">${esc(f.schema_id)}</div></div><div style="display:flex;gap:8px;align-items:center"><button class="btn" data-act="export-oapi" data-id="${esc(f.schema_id)}" title="Download this schema as OpenAPI 3.1">⬇ OpenAPI</button><span class="tag ${f.privacy_class}">${f.privacy_class}</span></div></div>
    <dl class="kv"><dt>family</dt><dd>${esc(f.family_id)}</dd><dt>version</dt><dd>v${f.version}</dd><dt>observations</dt><dd>${f.observation_count}</dd><dt>semantic sem_</dt><dd>${f.semantic_fingerprint?esc(f.semantic_fingerprint):'<span class="muted">not annotated</span>'}</dd><dt>canonicalizer</dt><dd>${esc(f.canonicalizer)}</dd></dl>
    <h2 class="sec" style="margin:16px 0 10px">Canonical shape · ${f.fields.length} fields</h2>${fields}
  </div>`;}

V.discovery=()=>{const cs=state.data.candidates;
  const body=cs.length?cs.map(candCard).join(''):'<div class="card empty">No pending candidates. The discovery queue is clear.</div>';
  return `<div class="pagehead"><h1>Discovery queue</h1><p>Stable clusters the model has proposed a decision for. Retrieval evidence and the gate verdict are shown separately; promote/reject writes to the registry under confirmation.</p></div>${banner()}${body}`;
};
function candCard(c){
  const dc=c.slm_decision==='match_schema'?'match':c.slm_decision==='new_candidate'?'new':'abstain';
  const sub=c.slm_relation||c.slm_novelty||c.slm_cause||'';
  const vcls=c.gate==='apply_ready'?'apply':c.gate==='deferred_new'?'new':'human';
  const vic=c.gate==='apply_ready'?'✓':c.gate==='deferred_new'?'✧':'⏸';
  const canPromote=canMutate()&&c.gate==='apply_ready';
  return `<div class="cand"><div class="h"><div><div class="num muted" style="font-size:11px">${esc(c.candidate_id)}</div><div style="margin-top:4px"><span class="dec ${dc}">${esc(c.slm_decision)}</span> <span class="muted" style="font-size:12px">${esc(sub)}${c.match_label?' → '+esc(c.match_label):''}</span></div></div><span class="chip">${c.observation_count} obs</span></div>
    <div class="fields">${(c.fields||[]).map(f=>`<span class="chip">${esc(f.path)}<span class="muted">:${f.type}</span></span>`).join('')||'<span class="muted" style="font-size:12px">no fields</span>'}</div>
    <div class="verdict ${vcls}"><span class="icn">${vic}</span><div><b>gate: ${esc(String(c.gate||'—').replace(/_/g,' '))}</b><br><span style="opacity:.85">${esc(c.reason||'')}</span><br><span class="muted num" style="font-size:11px">retrieval dist ${c.top1_distance!=null?c.top1_distance:'—'} · margin ${c.margin!=null?c.margin:'—'}</span></div></div>
    <div class="actions"><button class="btn good" data-act="promote" data-id="${esc(c.candidate_id)}" ${canPromote?'':'disabled'}>Promote</button><button class="btn risk" data-act="reject" data-id="${esc(c.candidate_id)}" ${canMutate()?'':'disabled'}>Reject</button></div></div>`;
}
function mutate(kind,id){
  const typed=kind==='promote';
  $('#overlay').innerHTML=`<div class="modal-bg"><div class="modal"><h3>${typed?'Promote':'Reject'} candidate</h3>
    <p>${typed?'Publishes this cluster as a governed schema in the registry.':'Drops this candidate from the discovery queue.'} The API enforces authentication, state-transition legality, and audit attribution.</p>
    <p class="muted num" style="font-size:11.5px">${esc(id)}</p>
    <label>Reason (recorded)</label><input id="mreason" placeholder="why">
    ${typed?`<label>Type the candidate id to confirm</label><input id="mconfirm" placeholder="${esc(id)}">`:''}
    <div class="row2"><button class="btn" data-mno>Cancel</button><button class="btn ${typed?'good':'risk'}" data-myes>${typed?'Promote':'Reject'}</button></div></div></div>`;
  $('#overlay').querySelector('[data-mno]').onclick=()=>$('#overlay').innerHTML='';
  $('#overlay').querySelector('[data-myes]').onclick=async()=>{
    const reason=($('#mreason').value||'').trim();
    if(!reason){toast('A reason is required.');return;}
    if(typed&&($('#mconfirm').value||'').trim()!==id){toast('Typed id does not match.');return;}
    $('#overlay').innerHTML='';
    try{await api(`/api/v1/candidates/${encodeURIComponent(id)}/${kind}`,{method:'POST',body:JSON.stringify({reason})});
      toast(`Candidate ${kind}d.`);state.data.candidates=state.data.candidates.filter(c=>c.candidate_id!==id);render();
    }catch(e){toast('Failed: '+e.message);}
  };
}

V.families=()=>{const fams=state.data.families;
  const rows=fams.map(f=>`<tr><td><b>${esc(f.label)}</b><div class="muted num" style="font-size:10.5px">${esc(f.family_id)}</div></td><td class="num">v${f.version}</td><td class="num">${f.observation_count}</td><td class="num">${f.fields.length}</td><td><span class="tag ${f.privacy_class}">${f.privacy_class}</span></td></tr>`).join('');
  return `<div class="pagehead"><h1>Families &amp; versions</h1><p>Each family groups the evolving versions of one logical event type. Structural drift bumps the version; identity is preserved.</p></div>
  <div class="tw"><table><thead><tr><th>Family</th><th>version</th><th>observations</th><th>fields</th><th>privacy</th></tr></thead><tbody>${rows}</tbody></table></div>`;
};

V.similarity=()=>`<div class="pagehead"><h1>Similarity</h1><p>Schemas related by structural distance (weighted-Jaccard; lower = more similar). This is what retrieval sees before any model runs — the matrix is the pairwise overview, the list drills into each schema's nearest neighbours.</p></div>
  <h2 class="sec">Distance matrix</h2><div class="card">${simMatrix()}</div>
  <h2 class="sec">Nearest neighbours</h2>${simList()}`;
function simMatrix(){
  const fams=state.data.families; if(!fams.length) return '<div class="empty">No schemas yet.</div>';
  const nb=state.data.neighbors||{};
  const dist=(a,b)=>{if(a===b)return 0;const x=(nb[a]||[]).find(n=>n.schema_id===b);if(x)return x.distance;const y=(nb[b]||[]).find(n=>n.schema_id===a);return y?y.distance:null;};
  if(!fams.some(f=>(nb[f.schema_id]||[]).length))
    return '<div class="empty" style="padding:24px">No neighbour distances to plot — these schemas carry no semantic annotation yet. Structural retrieval still tags events; the SLM similarity lane is disabled in this deployment.</div>';
  const cell=d=>{if(d===null)return '<td class="mx none" title="no computed relation">·</td>';if(d===0)return '<td class="mx self">—</td>';const c=d<0.5?'close':(d<0.85?'mid':'far');return `<td class="mx ${c}">${d.toFixed(2)}</td>`;};
  const head=`<tr><th></th>${fams.map(f=>`<th>${esc(f.label)}</th>`).join('')}</tr>`;
  const rows=fams.map(a=>`<tr><th class="l">${esc(a.label)}</th>${fams.map(b=>cell(dist(a.schema_id,b.schema_id))).join('')}</tr>`).join('');
  return `<div class="mxwrap"><table class="mx-t">${head}${rows}</table></div><div class="mxleg"><span><i style="background:var(--good-soft)"></i>close &lt;0.5</span><span><i style="background:var(--accent-soft)"></i>related 0.5–0.85</span><span><i style="background:var(--track)"></i>distant</span><span><i style="background:var(--sunk)"></i>no relation</span></div>`;}
function simList(){return state.data.families.map(f=>{const ns=(state.data.neighbors[f.schema_id]||[]).slice(0,3);
  return `<div class="card" style="margin-bottom:12px"><div style="font-weight:600;margin-bottom:10px">${esc(f.label)} <span class="muted num" style="font-weight:400;font-size:11px">${shortId(f.schema_id)}</span></div>${ns.map(n=>`<div class="nb"><div class="lab">${esc(n.label)}</div><div class="tk"><div class="fl ${n.distance<0.5?'close':''}" style="width:${(1-n.distance)*100}%"></div></div><div class="v">${n.distance.toFixed(2)}</div></div>`).join('')||'<div class="muted" style="font-size:12px">no close neighbours</div>'}</div>`;}).join('');}

V.model=()=>{const md=state.data.model;if(!md)return '<div class="card empty">No model info</div>';
  const dl=o=>`<dl class="kv">${Object.entries(o).map(([k,v])=>`<dt>${esc(k.replace(/_/g,' '))}</dt><dd>${esc(String(v))}</dd>`).join('')}</dl>`;
  return `<div class="pagehead"><h1>Model &amp; learning</h1><p>Deblob is a governed registry, not just an ML dashboard. The learned lane improves under a promotion gate the training hook cannot bypass. ${state.live?'':'<span class="muted">(demo values from the reference training round.)</span>'}</p></div>
  <div class="grid cols2">
    <div class="card"><h2 class="sec" style="margin:0 0 10px">Active model bundle</h2>${dl(md.active)}</div>
    <div class="card"><h2 class="sec" style="margin:0 0 10px">Offline promotion gate</h2>${dl(md.gate)}</div>
    <div class="card"><h2 class="sec" style="margin:0 0 10px">Candidate &amp; rollback</h2>${dl(md.candidate)}</div>
    <div class="card"><h2 class="sec" style="margin:0 0 10px">Feedback loop</h2>${dl(md.feedback)}</div>
  </div>
  <h2 class="sec">Last evaluation</h2><div class="grid cols3">
    <div class="card stat"><p class="k">New-family recall</p><div class="v good num">${esc(md.eval.new_family_recall.split(' ')[0])}</div><p class="s">held-out families</p></div>
    <div class="card stat"><p class="k">Decision accuracy</p><div class="v num">${esc(md.eval.decision_accuracy)}</div><p class="s">3-way, family-held-out</p></div>
    <div class="card stat"><p class="k">Hallucinated ids</p><div class="v good num">${md.eval.hallucinated_ids}</div><p class="s">catalogue-constrained scoring</p></div>
  </div>
  <p class="muted" style="font-size:11.5px;margin-top:14px">Development-set operating-point estimates. See <a href="https://github.com/kamilrybacki/deblob/blob/main/docs/whitepaper.html" target="_blank" rel="noopener" style="color:var(--accent)">the whitepaper</a> for methodology and limitations.</p>`;
};

V.operations=()=>{const o=state.data.ops||{};const m=state.data.metrics;
  const dot=v=>`<span class="v ${v==='200'||v==='connected'?'good':'risk'}" style="font-size:18px">${esc(v)}</span>`;
  return `<div class="pagehead"><h1>Operations</h1><p>Liveness, dependency state, and the relay's real work — not a single green badge.</p></div>${banner()}
  <div class="grid cols4">
    <div class="card stat"><p class="k">/healthz</p><div id="hz">${dot(o.healthz||'200')}</div><p class="s">process liveness</p></div>
    <div class="card stat"><p class="k">/readyz</p><div id="rz">${dot(o.readyz||'200')}</div><p class="s">deps reachable</p></div>
    <div class="card stat"><p class="k">Redis vault</p><div>${dot(o.redis||'connected')}</div><p class="s">schema + feedback store</p></div>
    <div class="card stat"><p class="k">Kafka / Redpanda</p><div>${dot(o.kafka||'connected')}</div><p class="s">transactional relay</p></div>
  </div>
  <h2 class="sec">Relay</h2><div class="grid cols4">
    <div class="card stat"><p class="k">Throughput</p><div class="v num">${o.relay_rec_s??598}/s</div><p class="s">exactly-once records</p></div>
    <div class="card stat"><p class="k">Consumer lag</p><div class="v good num">${o.consumer_lag??0}</div><p class="s">records behind</p></div>
    <div class="card stat"><p class="k">Txn failures</p><div class="v good num">${o.txn_failures??0}</div><p class="s">aborted transactions</p></div>
    <div class="card stat"><p class="k">Hot-path</p><div class="v num">${m.hot_path_ms??0.43} ms</div><p class="s">tag &amp; resolve</p></div>
  </div>
  <p class="muted num" style="font-size:11.5px;margin-top:14px">last processed: ${esc(o.last_processed||'—')} · /metrics is a protected Prometheus scrape target</p>`;
};

V.quarantine=()=>{const q=state.data.quarantine||[];
  const rows=q.map(x=>`<tr><td class="num">${esc(x.raw_digest)}</td><td>${esc(x.reason)}</td><td class="num">${x.count}</td><td class="num muted">${esc(x.first_seen||'')}</td></tr>`).join('');
  return `<div class="pagehead"><h1>Quarantine</h1><p>Events that failed bounded parsing. They never enter the schema vault; they're isolated for inspection.</p></div>
  ${q.length?`<div class="tw"><table><thead><tr><th>digest</th><th>reason</th><th>count</th><th>first seen</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="card empty">Quarantine is empty — all ingested events parsed cleanly.</div>'}`;
};

function connectModal(){
  $('#overlay').innerHTML=`<div class="modal-bg"><div class="modal"><h3>Connect to Deblob</h3><p>Point the console at a running management API. Blank = bundled demo data. The token is held in this tab only (sessionStorage), never persisted to disk.</p>
    <label>API base URL</label><input id="cbase" placeholder="https://deblob.your-domain" value="${esc(state.base)}">
    <label>Bearer token (optional — enables mutations)</label><input id="ctok" type="password" placeholder="mgmt API token" value="${esc(state.token)}">
    <div class="row2"><button class="btn" data-cclear>Use demo</button><button class="btn good" data-csave>Connect</button></div></div></div>`;
  $('#overlay').querySelector('[data-cclear]').onclick=()=>{localStorage.removeItem('deblob.base');sessionStorage.removeItem('deblob.token');state.base='';state.token='';$('#overlay').innerHTML='';boot();};
  $('#overlay').querySelector('[data-csave]').onclick=async()=>{state.base=$('#cbase').value.trim();state.token=$('#ctok').value.trim();
    if(state.base)localStorage.setItem('deblob.base',state.base);else localStorage.removeItem('deblob.base');
    if(state.token)sessionStorage.setItem('deblob.token',state.token);else sessionStorage.removeItem('deblob.token');
    $('#overlay').innerHTML='';toast('Connecting…');await boot();toast(state.live?'Connected.':'Could not reach API — showing demo data.');};
}

function render(){const v=location.hash.replace('#','')||'explorer';$$('#nav a').forEach(a=>a.classList.toggle('on',a.dataset.v===v));$('#main').innerHTML=(V[v]||V.explorer)();afterRender(v);}
function afterRender(v){
  if(v==='schemas'){const s=$('#schsearch');if(s)s.oninput=()=>{const q=s.value.toLowerCase();$('#schrows').innerHTML=schemaRows(state.data.families.filter(f=>f.label.toLowerCase().includes(q)||f.schema_id.includes(q)));};}
  if(v==='operations'&&state.live){
    // Status-based probe (health endpoints return plain text/empty, not JSON, so
    // never call .json() here). /healthz and /readyz are proxied to the mgmt API.
    const probe=(p,el,downTxt)=>fetch(state.base.replace(/\/$/,'')+p,{headers:{'Accept':'*/*'}})
      .then(r=>{$(el).innerHTML=`<span class="v ${r.ok?'good':'risk'}" style="font-size:18px">${r.ok?'200':(r.status||downTxt)}</span>`;})
      .catch(()=>{$(el).innerHTML=`<span class="v risk" style="font-size:18px">${downTxt}</span>`;});
    probe('/healthz','#hz','down'); probe('/readyz','#rz','not ready');
  }
}
// event delegation (no inline handlers -> CSP-safe)
$('#main').addEventListener('click',e=>{
  const t=e.target.closest('[data-tab],[data-sch],[data-act]');if(!t)return;
  if(t.dataset.tab!=null){state.tab=+t.dataset.tab;render();}
  else if(t.dataset.sch){state.sel.schema=t.dataset.sch;$('#schdetail').innerHTML=schemaDetail(state.data.families.find(f=>f.schema_id===t.dataset.sch));$$('#schrows .row').forEach(x=>x.classList.toggle('on',x.dataset.sch===t.dataset.sch));}
  else if(t.dataset.act&&!t.disabled){if(t.dataset.act==='export-oapi')exportOpenAPI(t.dataset.id);else mutate(t.dataset.act,t.dataset.id);}
});
$$('#nav a').forEach(a=>a.onclick=e=>{e.preventDefault();location.hash=a.dataset.v;});
window.addEventListener('hashchange',render);
$('#connect').onclick=connectModal;
$('#theme').onclick=()=>{const r=document.documentElement;const cur=r.getAttribute('data-theme')||(matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');const nx=cur==='dark'?'light':'dark';r.setAttribute('data-theme',nx);localStorage.setItem('deblob.theme',nx);};
const th=localStorage.getItem('deblob.theme');if(th)document.documentElement.setAttribute('data-theme',th);
async function boot(){await loadData();setMode();render();}
boot();
</script>
