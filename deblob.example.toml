# deblob.example.toml
#
# Non-secret operational configuration for the `deblob` binary (spec §9).
# Copy this file to `deblob.toml` (the default `--config` path) and adjust
# per environment.
#
# SECRETS NEVER GO IN THIS FILE. `DEBLOB_API_TOKEN`, `DEBLOB_REDIS_URL`,
# `DEBLOB_KAFKA_BROKERS`, and the optional `DEBLOB_KAFKA_SASL_*` /
# `DEBLOB_KAFKA_SECURITY_PROTOCOL` credentials are read exclusively from
# environment variables at startup — see `crates/deblob/src/config.rs`.

[kafka]
raw_topic = "events.raw"
tagged_topic = "events.tagged"
discovery_topic = "deblob.discovery"
quarantine_topic = "deblob.quarantine"
group_id = "deblob"
transactional_id = "deblob-relay-1"
# Relay transaction batching (docs/superpowers/specs/2026-07-16-relay-batching.md):
# commit ONE Kafka transaction per batch of up to `max_batch_records` records,
# or whatever accumulated within `max_batch_linger_ms` — amortises the
# per-commit latency across the batch (~100x throughput vs one transaction
# per record). Both are optional; omitting them defaults to 500 / 100ms.
# `max_batch_records = 1` reproduces the exact pre-batching per-record
# behaviour.
# max_batch_records = 500
# max_batch_linger_ms = 100

[limits]
max_bytes = 1048576
max_depth = 32
max_fields_per_object = 1024

[promotion]
min_samples = 10
min_age_ms = 300000

[management]
addr = "127.0.0.1:9615"

# [slm] — SLM shadow lane (P2-A/B Task 5b). OFF by default: unless
# `enabled = true` is set explicitly, `deblob` wires up NO SLM inferencer
# and spawns NO periodic shadow sweep — behavior is identical to a build
# without the shadow lane at all. Every field below is only read when
# `enabled = true`.
#
# `DEBLOB_SLM_API_TOKEN` is ENV-ONLY — it is NEVER set in this file, and is
# REQUIRED (startup fails, naming the variable) only when `[slm].enabled`
# is `true`. When `enabled = false` (or `[slm]` is omitted entirely), the
# token is not required at all.
[slm]
enabled = false
base_url = "http://localhost:8000/v1"
model = "granite-4.0-nano-1b"
timeout_ms = 8000
max_concurrency = 2
sweep_interval_ms = 30000
min_samples = 5
min_window_ms = 60000

# [http_proxy] — HTTP push reverse proxy (P2-C Task 4). OFF by default:
# unless `enabled = true` is set explicitly, `deblob` binds no ingest
# listener and spawns no proxy task — behavior is identical to a build
# without the HTTP proxy at all. Every field below is only read when
# `enabled = true`.
#
# `DEBLOB_HTTP_INGEST_TOKEN` is ENV-ONLY — it is NEVER set in this file,
# and is REQUIRED (startup fails, naming the variable) only when
# `[http_proxy].require_auth` is `true`. When `require_auth = false` (the
# default) or `[http_proxy]` is omitted entirely, the token is not
# required at all.
# [http_proxy]
# enabled = false
# listen_addr = "127.0.0.1:9600"
# upstream_allowlist = ["https://upstream.internal:8443"]
# route = "https://upstream.internal:8443/ingest"
# max_body_bytes = 1048576
# max_header_bytes = 65536
# max_header_count = 200
# request_timeout_ms = 10000
# header_read_timeout_ms = 10000
# upstream_timeout_ms = 10000
# discovery_enqueue_timeout_ms = 500
# require_auth = false

# [semantic] — governance-registered canonical_field_id/canonical_event_type_id
# vocabularies (P2-D Task 8 follow-up). Absent entirely (or present with both
# lists empty, the default) means every semantic annotation naming a
# canonical_field_id/event_type still 422s, exactly Task 6's original
# behavior — nothing here is required for the rest of deblob to function.
# The baked UCUM/ISO4217/namespace/meaning-code vocabularies do NOT go here;
# only these two per-operator governance sets do. See
# docs/semantic-runbook.md for how to register one.
[semantic]
canonical_field_ids = []
event_types = []

# [auto_promote] — automatic candidate promotion. OFF by default: promotion
# stays human-driven exactly as before unless `enabled = true`. When enabled, a
# periodic sweep publishes any PROVISIONAL candidate that clears a deterministic
# bar WITHOUT a human in the loop. DEFAULT-DENY by source: `allowed_sources`
# must name the trusted relay topics, or nothing is promoted — so a lower-trust
# or attacker-reachable producer cannot grind a crafted shape into a governed
# schema. Thresholds must be >= the `[promotion]` guards above (validated at
# startup). Not safe to enable until observed on real traffic.
# [auto_promote]
# enabled = false
# allowed_sources = ["events.grid.carbonintensity"]  # required when enabled
# min_samples = 50                # >= [promotion].min_samples
# min_age_ms = 600000             # >= [promotion].min_age_ms (10 min)
# min_required_fields = 2         # required leaf fields (>=1); 2 rejects wrappers
# min_required_ratio = 0.5        # fraction of leaf fields that must be required
# sweep_interval_ms = 30000       # must be > 0
# max_promotions_per_tick = 20    # caps blast radius on a large backlog
