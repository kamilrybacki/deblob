# deblob.example.toml
#
# Non-secret operational configuration for the `deblob` binary (spec §9).
# Copy this file to `deblob.toml` (the default `--config` path) and adjust
# per environment.
#
# SECRETS NEVER GO IN THIS FILE. `DEBLOB_API_TOKEN`, `DEBLOB_REDIS_URL`,
# `DEBLOB_KAFKA_BROKERS`, and the optional `DEBLOB_KAFKA_SASL_*` /
# `DEBLOB_KAFKA_SECURITY_PROTOCOL` credentials are read exclusively from
# environment variables at startup — see `crates/deblob/src/config.rs`.

[kafka]
raw_topic = "events.raw"
tagged_topic = "events.tagged"
discovery_topic = "deblob.discovery"
quarantine_topic = "deblob.quarantine"
group_id = "deblob"
transactional_id = "deblob-relay-1"

[limits]
max_bytes = 1048576
max_depth = 32
max_fields_per_object = 1024

[promotion]
min_samples = 10
min_age_ms = 300000

[management]
addr = "127.0.0.1:9615"

# [slm] — SLM shadow lane (P2-A/B Task 5b). OFF by default: unless
# `enabled = true` is set explicitly, `deblob` wires up NO SLM inferencer
# and spawns NO periodic shadow sweep — behavior is identical to a build
# without the shadow lane at all. Every field below is only read when
# `enabled = true`.
#
# `DEBLOB_SLM_API_TOKEN` is ENV-ONLY — it is NEVER set in this file, and is
# REQUIRED (startup fails, naming the variable) only when `[slm].enabled`
# is `true`. When `enabled = false` (or `[slm]` is omitted entirely), the
# token is not required at all.
[slm]
enabled = false
base_url = "http://localhost:8000/v1"
model = "granite-4.0-nano-1b"
timeout_ms = 8000
max_concurrency = 2
sweep_interval_ms = 30000
min_samples = 5
min_window_ms = 60000
